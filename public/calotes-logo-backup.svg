<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <!-- Background: transparent -->
  
  <!-- Iguana SVG (simplified) -->
  <g transform="translate(140, 10) scale(0.7)">
    <!-- Body -->
    <ellipse cx="120" cy="80" rx="80" ry="45" fill="#4A7C35" />
    <!-- Head -->
    <ellipse cx="200" cy="55" rx="45" ry="35" fill="#C8882A" />
    <!-- Eye -->
    <circle cx="215" cy="50" r="8" fill="#1A1A1A" />
    <circle cx="218" cy="47" r="3" fill="white" />
    <!-- Spine spikes -->
    <polygon points="100,40 110,15 115,40" fill="#2D5A1E" />
    <polygon points="120,38 130,12 135,38" fill="#2D5A1E" />
    <polygon points="140,36 150,10 155,36" fill="#2D5A1E" />
    <polygon points="160,36 168,12 173,36" fill="#2D5A1E" />
    <polygon points="178,36 185,14 190,36" fill="#2D5A1E" />
    <!-- Tail -->
    <path d="M40,95 Q20,120 10,150 Q5,170 15,165 Q25,155 30,140 Q45,115 60,100" fill="#3D6B2A" />
    <!-- Front legs -->
    <path d="M140,115 Q130,140 120,155 Q115,162 125,160 Q135,155 145,140 Q150,125 150,115" fill="#4A7C35" />
    <path d="M170,118 Q165,145 158,158 Q153,165 163,162 Q173,156 178,142 Q182,126 178,118" fill="#4A7C35" />
    <!-- Claws front -->
    <line x1="120" y1="160" x2="108" y2="170" stroke="#C8882A" stroke-width="3" />
    <line x1="120" y1="160" x2="118" y2="172" stroke="#C8882A" stroke-width="3" />
    <line x1="120" y1="160" x2="128" y2="170" stroke="#C8882A" stroke-width="3" />
    <!-- Dewlap -->
    <path d="M195,75 Q210,95 205,110 Q195,105 190,90 Z" fill="#C8882A" />
  </g>
  
  <!-- CALOTES text -->
  <text x="200" y="165" font-family="Georgia, serif" font-weight="900" font-size="52" fill="#C84B2F" text-anchor="middle" letter-spacing="4">CALOTES</text>
  
  <!-- Tagline -->
  <text x="200" y="195" font-family="Georgia, serif" font-style="italic" font-size="14" fill="#3D5A2A" text-anchor="middle" letter-spacing="1">Adapt. Stand Out. Be Calotes.</text>
</svg>
